# Mantém o app mobile (Capacitor) sincronizado e compilando a cada mudança
# no código. Valida o build web (Next.js), roda `cap sync` e gera o APK de
# debug do Android como artefato. O build de iOS exige macOS/Xcode com
# certificados de assinatura, então aqui validamos apenas o sync do projeto.
name: Mobile App

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "mobile/**"
      - "android/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - ".github/workflows/mobile.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  web-build:
    name: Build web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

  android:
    name: Build Android (debug APK)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: focatto-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  ios-sync:
    name: Validate iOS sync
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync (ios, sem pod install)
        run: npx cap sync ios
